<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>결제 완료 - X-House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #0a0a0f 0%, #12121f 40%, #1a0f2e 100%);
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 680px;
      text-align: center;
      padding: 40px 20px;
    }
    .success-icon {
      font-size: 6rem;
      margin-bottom: 20px;
      color: #22c55e;
    }
    h1 {
      font-size: 3.2rem;
      margin-bottom: 16px;
      color: #fff;
    }
    p {
      font-size: 1.35rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }
    .card {
      background: rgba(30, 25, 60, 0.9);
      border: 2px solid #7b6eff;
      border-radius: 22px;
      padding: 50px 40px;
      box-shadow: 0 25px 55px rgba(123, 110, 255, 0.3);
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: #22c55e;
      color: white;
      padding: 18px 50px;
      font-size: 1.35rem;
      font-weight: 700;
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
    }
    .btn:hover {
      transform: scale(1.08);
      background: #16a34a;
    }
    #result {
      margin-top: 30px;
      font-size: 1.15rem;
      min-height: 100px;
    }
    .link {
      background: #1a1a2e;
      padding: 18px;
      border-radius: 12px;
      margin-top: 20px;
      word-break: break-all;
      font-family: monospace;
      color: #39ff9e;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="success-icon">✅</div>
    <h1>결제가 완료되었습니다!</h1>
    <p>감사합니다. B서버 초대링크를 생성해 드리겠습니다.</p>

    <div class="card">
      <button onclick="getInviteLink()" class="btn" id="inviteBtn">
        B서버 1회용 초대링크 받기
      </button>

      <div id="result"></div>
    </div>

    <p style="opacity: 0.7; font-size: 1rem;">
      ※ 생성된 링크는 <strong>1회용</strong>입니다.<br>
      바로 입장해 주세요.
    </p>
  </div>

  <script>
    async function getInviteLink() {
      const btn = document.getElementById('inviteBtn');
      const resultDiv = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = "링크 생성 중...";

      try {
        const response = await fetch('https://your-render-url.onrender.com/create-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' }
        });

        const data = await response.json();

        if (data.success) {
          resultDiv.innerHTML = `
            <p style="color:#39ff9e; font-size:1.3rem; margin-bottom:15px;">✅ 초대링크가 생성되었습니다!</p>
            <div class="link">${data.invite_url}</div>
            <p style="margin-top:15px; color:#ffaa00;">링크는 1회용입니다. 바로 클릭해서 입장해주세요.</p>
          `;
        } else {
          resultDiv.innerHTML = `<p style="color:#ff5555;">오류: ${data.error || '알 수 없는 오류'}</p>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<p style="color:#ff5555;">서버 연결 오류가 발생했습니다.</p>`;
      }
    }
  </script>

</body>
</html>
