<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful - X-House</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(145deg, #0a0a0f 0%, #12121f 40%, #1a0f2e 100%);
      color: #e0e0e0;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      max-width: 680px;
      text-align: center;
      padding: 40px 20px;
    }
    .success-icon {
      font-size: 6rem;
      margin-bottom: 20px;
      color: #22c55e;
    }
    h1 {
      font-size: 3.2rem;
      margin-bottom: 16px;
      color: #fff;
    }
    p {
      font-size: 1.35rem;
      margin-bottom: 40px;
      opacity: 0.9;
    }
    .card {
      background: rgba(30, 25, 60, 0.9);
      border: 2px solid #7b6eff;
      border-radius: 22px;
      padding: 50px 40px;
      box-shadow: 0 25px 55px rgba(123, 110, 255, 0.3);
      margin-bottom: 40px;
    }
    .btn {
      display: inline-block;
      background: #22c55e;
      color: white;
      padding: 18px 50px;
      font-size: 1.35rem;
      font-weight: 700;
      border-radius: 14px;
      text-decoration: none;
      transition: all 0.3s;
      margin-top: 10px;
      box-shadow: 0 10px 25px rgba(34, 197, 94, 0.4);
    }
    .btn:hover {
      transform: scale(1.08);
      background: #16a34a;
    }
    #result {
      margin-top: 30px;
      font-size: 1.15rem;
      min-height: 120px;
    }
    .link {
      background: #1a1a2e;
      padding: 18px;
      border-radius: 12px;
      margin-top: 20px;
      word-break: break-all;
      font-family: monospace;
      color: #39ff9e;
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="success-icon">✅</div>
    <h1>Payment Successful!</h1>
    <p>Thank you for your purchase.</p>

    <div class="card">
      <button onclick="getInviteLink()" class="btn" id="inviteBtn">
        Generate B Server One-Time Invite Link
      </button>

      <div id="result"></div>
    </div>

    <p style="opacity: 0.7; font-size: 1rem;">
      ※ This link is for <strong>one-time use only</strong>.<br>
      Please join immediately after receiving it.
    </p>
  </div>

  <script>
    async function getInviteLink() {
      const urlParams = new URLSearchParams(window.location.search);
      const sessionId = urlParams.get('session_id');

      if (!sessionId) {
        document.getElementById('result').innerHTML = 
          `<p style="color:#ff5555;">Error: No session ID found.</p>`;
        return;
      }

      const btn = document.getElementById('inviteBtn');
      const resultDiv = document.getElementById('result');

      btn.disabled = true;
      btn.textContent = "Generating link...";

      try {
        const response = await fetch('https://your-render-url.onrender.com/create-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ 
            session_id: sessionId 
          })
        });

        const data = await response.json();

        if (data.success) {
          resultDiv.innerHTML = `
            <p style="color:#39ff9e; font-size:1.3rem; margin-bottom:15px;">✅ Invite link generated!</p>
            <div class="link">${data.invite_url}</div>
            <p style="margin-top:15px; color:#ffaa00;">This link can only be used once. Please join immediately.</p>
          `;
        } else {
          resultDiv.innerHTML = `<p style="color:#ff5555;">Error: ${data.error || 'Unknown error'}</p>`;
        }
      } catch (err) {
        resultDiv.innerHTML = `<p style="color:#ff5555;">Server connection error. Please try again.</p>`;
      }
    }
  </script>

</body>
</html>
